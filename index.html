<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2Ray Scraper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    color: #fff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* پس‌زمینه متحرک */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%, rgba(88,166,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 50%, rgba(35,134,54,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .label {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }

  /* دکمه اصلی */
  .btn {
    position: relative;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    outline: none;
    transition: transform 0.2s;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #238636, #58a6ff, #238636);
    z-index: -1;
    animation: spin 4s linear infinite;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: #0d1117;
    z-index: -1;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn:hover { transform: scale(1.05); }
  .btn:active { transform: scale(0.97); }

  .btn-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
  }
  .btn-icon { font-size: 40px; }
  .btn-text { font-size: 13px; font-weight: 600; letter-spacing: 2px; color: rgba(255,255,255,0.8); }

  /* وضعیت */
  .status {
    font-size: 13px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.4);
    height: 20px;
    transition: color 0.3s;
  }
  .status.ok      { color: #3fb950; }
  .status.err     { color: #f85149; }
  .status.loading { color: #58a6ff; }

  /* حلقه لودینگ */
  .spinner {
    display: none;
    width: 24px; height: 24px;
    border: 2px solid rgba(88,166,255,0.2);
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: sp 0.8s linear infinite;
  }
  @keyframes sp { to { transform: rotate(360deg); } }
  .spinner.show { display: block; }

  /* تاریخ آخرین اجرا */
  .last { font-size: 11px; color: rgba(255,255,255,0.15); letter-spacing: 1px; }
</style>
</head>
<body>

<div class="wrap">
  <div class="label">V2Ray Scraper</div>

  <button class="btn" onclick="run()">
    <div class="btn-inner">
      <span class="btn-icon">▶</span>
      <span class="btn-text">اجرا</span>
    </div>
  </button>

  <div class="spinner" id="sp"></div>
  <div class="status" id="st"></div>
  <div class="last"   id="lr"></div>
</div>

<script>
// ─── تنظیمات — فقط اینجا رو عوض کن ─────────
const TOKEN    = "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";
const OWNER    = "MortezaMdamli";
const REPO     = "morvpnpy";
const WORKFLOW = "sconfig.yml";
const BRANCH   = "main";
// ─────────────────────────────────────────────

const sp = document.getElementById('sp');
const st = document.getElementById('st');
const lr = document.getElementById('lr');

const saved = localStorage.getItem('last_run');
if (saved) lr.textContent = 'آخرین اجرا: ' + saved;

async function run() {
  if (!confirm('اسکریپت رو اجرا کنم؟')) return;

  sp.classList.add('show');
  st.className = 'status loading';
  st.textContent = 'در حال ارسال...';

  try {
    const res = await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
      {
        method: 'POST',
        headers: {
          'Authorization': `token ${TOKEN}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: BRANCH }),
      }
    );

    if (res.status === 204) {
      const now = new Date().toLocaleString('fa-IR');
      localStorage.setItem('last_run', now);
      lr.textContent = 'آخرین اجرا: ' + now;
      st.className = 'status ok';
      st.textContent = '✓ شروع شد';
    } else {
      const j = await res.json().catch(() => ({}));
      st.className = 'status err';
      st.textContent = `✗ خطا ${res.status}: ${j.message || ''}`;
    }
  } catch(e) {
    st.className = 'status err';
    st.textContent = '✗ خطای اتصال';
  }

  sp.classList.remove('show');
}
</script>
</body>
</html>
